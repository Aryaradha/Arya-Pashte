<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0D0D0D;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
color:white;
}

/* Background Stars */

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:35px 35px;
opacity:.18;
animation:moveStars 70s linear infinite;
}

@keyframes moveStars{
from{transform:translate(0,0);}
to{transform:translate(-250px,-250px);}
}

/* Card */

.card{
width:420px;
max-width:92%;
padding:45px 35px;
text-align:center;
border-radius:30px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
box-shadow:0 0 45px rgba(255,79,135,.25);
position:relative;
z-index:5;
}

/* Heart */

.heart{
font-size:80px;
margin-bottom:20px;
animation:heartbeat 1.5s infinite;
text-shadow:
0 0 20px #FF4F87,
0 0 45px #FF4F87;
}

@keyframes heartbeat{

0%,100%{
transform:scale(1);
}

25%{
transform:scale(1.12);
}

50%{
transform:scale(.95);
}

75%{
transform:scale(1.15);
}

}

h1{
font-size:38px;
font-weight:700;
margin-bottom:20px;
}

.message{
font-size:20px;
line-height:32px;
margin-bottom:12px;
}

.hint{
font-size:15px;
color:#FFD6E5;
margin-bottom:30px;
}

input{
width:100%;
padding:18px;
border:none;
outline:none;
border-radius:16px;
background:rgba(255,255,255,.15);
color:white;
font-size:18px;
text-align:center;
margin-bottom:18px;
}

input::placeholder{
color:#ddd;
}

input:focus{
box-shadow:0 0 20px #FF4F87;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:16px;
font-size:18px;
font-weight:600;
cursor:pointer;
color:white;
background:linear-gradient(135deg,#FF4F87,#D4AF37);
transition:.3s;
}

button:hover{
transform:scale(1.03);
}

#status{
margin-top:20px;
min-height:30px;
color:#FFD700;
font-size:16px;
}

</style>
</head>

<body>

<div class="card">

<div class="heart">❤️</div>

<h1>Ek Chhoti Si Paheli</h1>

<p class="message">
Sirf tum hi mujhe is naam se bulati ho... ❤️
</p>

<p class="hint">
Hint: Wahi naam jo sirf tum use karti ho 😊
</p>

<input
type="password"
id="password"
placeholder="Apna jawab yahan likho...">

<button id="unlockBtn">
Unlock ❤️
</button>

<p id="status"></p>

</div><script>

const correctPassword = "Arya Sir";

const input = document.getElementById("password");
const button = document.getElementById("unlockBtn");
const status = document.getElementById("status");
const heart = document.querySelector(".heart");

// Unlock when button is clicked
button.addEventListener("click", unlock);

// Unlock when Enter is pressed
input.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        unlock();
    }
});

function unlock(){

    let value = input.value.trim();

 if(value.toLowerCase() === correctPassword.toLowerCase()){

    status.innerHTML = "❤️ Mujhe pata tha... Sirf tumhe hi yaad hoga.";

    heart.style.transition = "0.8s";
    heart.style.transform = "scale(1.4)";
    heart.style.textShadow =
    "0 0 20px #FF4F87, 0 0 60px #FF4F87, 0 0 120px #FFD700";

    button.innerHTML = "Unlocked ❤️";

    button.style.background =
    "linear-gradient(135deg,#00C853,#64DD17)";

    setTimeout(function(){

        document.body.style.transition = "opacity 1.5s";
        document.body.style.opacity = "0";

        setTimeout(function(){

            window.location.href = "birthday.html";

        },1500);

    },1200);


    }

    else{

        status.innerHTML =
        "😅 Nahi... Ye woh naam nahi hai. Dobara socho ❤️";

        input.animate([
            {transform:'translateX(0px)'},
            {transform:'translateX(-10px)'},
            {transform:'translateX(10px)'},
            {transform:'translateX(-10px)'},
            {transform:'translateX(10px)'},
            {transform:'translateX(0px)'}
        ],{
            duration:500
        });

        input.value="";
    }

}

</script>

</body>
</html>
